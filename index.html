<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイル見積り</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f3f6fb;
      --bg-accent:
        radial-gradient(circle at top left, rgba(14, 116, 144, 0.18), transparent 34%),
        radial-gradient(circle at top right, rgba(249, 115, 22, 0.14), transparent 26%),
        linear-gradient(180deg, #f9fbff 0%, #eef3f8 100%);
      --surface: rgba(255, 255, 255, 0.82);
      --surface-strong: rgba(255, 255, 255, 0.96);
      --surface-soft: rgba(244, 247, 252, 0.92);
      --border: rgba(15, 23, 42, 0.1);
      --text: #142033;
      --text-muted: #5a687d;
      --primary: #0f766e;
      --primary-strong: #115e59;
      --primary-soft: rgba(15, 118, 110, 0.13);
      --warning: #b45309;
      --warning-soft: rgba(180, 83, 9, 0.12);
      --danger: #c2410c;
      --danger-soft: rgba(194, 65, 12, 0.12);
      --shadow: 0 18px 44px rgba(15, 23, 42, 0.1);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --max-width: 860px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #08111c;
        --bg-accent:
          radial-gradient(circle at top left, rgba(45, 212, 191, 0.12), transparent 34%),
          radial-gradient(circle at top right, rgba(251, 146, 60, 0.14), transparent 28%),
          linear-gradient(180deg, #09111b 0%, #0d1624 100%);
        --surface: rgba(11, 19, 33, 0.84);
        --surface-strong: rgba(14, 23, 38, 0.98);
        --surface-soft: rgba(13, 23, 38, 0.94);
        --border: rgba(148, 163, 184, 0.18);
        --text: #edf4ff;
        --text-muted: #9eb0c5;
        --primary: #41c7bc;
        --primary-strong: #76e0d7;
        --primary-soft: rgba(65, 199, 188, 0.14);
        --warning: #f59e0b;
        --warning-soft: rgba(245, 158, 11, 0.14);
        --danger: #fb923c;
        --danger-soft: rgba(251, 146, 60, 0.14);
        --shadow: 0 24px 48px rgba(2, 6, 23, 0.38);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "BIZ UDPGothic", sans-serif;
      color: var(--text);
      background: var(--bg-accent);
      line-height: 1.5;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, rgba(255, 255, 255, 0.06), transparent 42%),
        linear-gradient(300deg, rgba(255, 255, 255, 0.04), transparent 34%);
      opacity: 0.8;
    }

    .shell {
      position: relative;
      width: min(calc(100% - 24px), var(--max-width));
      margin: 0 auto;
      padding: 18px 0 26px;
    }

    .app-header {
      margin-bottom: 14px;
      padding: 2px 2px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2rem);
      line-height: 1.15;
      letter-spacing: 0.02em;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .mode-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px;
    }

    .mode-tab {
      flex: 1;
      border: 0;
      background: transparent;
      color: var(--text-muted);
      padding: 9px 12px;
      border-radius: 999px;
      font: inherit;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease;
    }

    .mode-tab.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-strong));
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(15, 118, 110, 0.22);
    }

    body.mode-auction-only .bank-only {
      display: none !important;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .card-body {
      padding: 18px;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--text-muted);
    }

    .input-group {
      display: grid;
      gap: 14px;
    }

    .rate-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    @media (max-width: 480px) {
      .rate-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }
      .rate-grid .field label {
        font-size: 0.82rem;
      }
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 0.92rem;
      font-weight: 700;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap span {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.86rem;
      pointer-events: none;
      white-space: nowrap;
    }

    .input-wrap .suffix {
      right: 12px;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      border-radius: var(--radius-md);
      padding: 13px 78px 13px 14px;
      font: inherit;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .mile-input input {
      padding-right: 68px;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-soft);
    }

    .status-list {
      display: grid;
      gap: 8px;
      min-height: 18px;
    }

    .status {
      display: none;
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .status.active {
      display: block;
    }

    .status.error {
      color: var(--danger);
    }

    .status.warning {
      color: var(--warning);
    }

    .status.info {
      color: var(--primary);
    }

    .profit-display {
      font-size: 0.8rem;
      font-weight: 700;
      min-height: 1.2em;
    }

    .profit-positive {
      color: var(--primary);
    }

    .profit-negative {
      color: var(--danger);
    }

    .output-grid {
      display: grid;
      gap: 12px;
    }

    .quote-list {
      display: grid;
      gap: 10px;
    }

    .quote-row {
      display: grid;
      gap: 4px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface-soft);
    }

    .quote-label {
      font-size: 0.84rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    .quote-value {
      font-size: clamp(1.06rem, 2.6vw, 1.24rem);
      font-weight: 800;
      line-height: 1.35;
      word-break: break-word;
    }

    .message-wrap {
      display: grid;
      gap: 10px;
      margin-top: 2px;
    }

    .message-box {
      width: 100%;
      min-height: 210px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface-strong);
      color: var(--text);
      padding: 14px;
      font: inherit;
      line-height: 1.65;
      resize: vertical;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
    }

    .button {
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--primary), var(--primary-strong));
      color: #ffffff;
      padding: 11px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(15, 118, 110, 0.24);
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 32px rgba(15, 118, 110, 0.26);
    }

    .button:active {
      transform: translateY(1px);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
      box-shadow: none;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translate(-50%, 16px);
      background: rgba(17, 24, 39, 0.92);
      color: #f8fafc;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 700;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      z-index: 10;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 640px) {
      .shell {
        width: min(calc(100% - 16px), var(--max-width));
        padding-top: 14px;
      }

      .card-body {
        padding: 16px;
      }

      .rate-grid {
        gap: 10px;
      }

      .quote-row {
        padding: 12px 14px;
      }

      .message-box {
        min-height: 190px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="app-header">
      <h1>マイル見積り</h1>
      <button id="copyButton" class="button" type="button" disabled>コピー</button>
    </header>

    <div class="mode-tabs" role="tablist">
      <button class="mode-tab active" data-mode="both" type="button" role="tab">通常版（ヤフオク＋銀行振込）</button>
      <button class="mode-tab" data-mode="auction-only" type="button" role="tab">ヤフオクのみ</button>
    </div>

    <section class="stack">
      <article class="card">
        <div class="card-body">
          <div class="input-group">
            <section>
              <h2 class="section-title">マイル数</h2>
              <div class="field mile-input">
                <div class="input-wrap">
                  <input id="mileCount" type="number" inputmode="numeric" step="1" min="0" placeholder="例: 120000">
                  <span class="suffix">マイル</span>
                </div>
              </div>
              <div class="status-list" aria-live="polite">
                <div class="status error" id="mileError"></div>
                <div class="status warning" id="mileWarning"></div>
                <div class="status info" id="mileAdjusted"></div>
              </div>
            </section>

            <section>
              <h2 class="section-title">レート設定</h2>
              <div class="rate-grid">
                <div class="field">
                  <label for="auctionRate">ヤフオク定価</label>
                  <div class="input-wrap">
                    <input id="auctionRate" type="number" inputmode="decimal" step="0.01" min="0" value="3.10">
                    <span class="suffix">円/マイル</span>
                  </div>
                </div>
                <div class="field">
                  <label for="auctionDiscountRate">ヤフオク値引</label>
                  <div class="input-wrap">
                    <input id="auctionDiscountRate" type="number" inputmode="decimal" step="0.01" min="0" value="3.05">
                    <span class="suffix">円/マイル</span>
                  </div>
                  <small class="profit-display" id="auctionProfit"></small>
                  <small class="profit-display" id="auctionProfitAmount"></small>
                </div>
                <div class="field bank-only">
                  <label for="bankRate">銀行振込</label>
                  <div class="input-wrap">
                    <input id="bankRate" type="number" inputmode="decimal" step="0.01" min="0" value="2.80">
                    <span class="suffix">円/マイル</span>
                  </div>
                  <small class="profit-display" id="bankProfit"></small>
                  <small class="profit-display" id="bankProfitAmount"></small>
                </div>
              </div>
            </section>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="card-body">
          <div class="output-grid">
            <section>
              <h2 class="section-title">見積り結果</h2>
              <div class="quote-list">
                <div class="quote-row">
                  <div class="quote-label">ヤフオク</div>
                  <div class="quote-value" id="auctionSummary">-</div>
                </div>
                <div class="quote-row bank-only">
                  <div class="quote-label">銀行振込</div>
                  <div class="quote-value" id="bankSummary">-</div>
                </div>
              </div>
            </section>

            <section class="message-wrap">
              <h2 class="section-title">メッセージ</h2>
              <textarea id="messageBox" class="message-box" readonly aria-label="自動生成メッセージ">マイル数を入力すると、ここにご案内文を生成します。</textarea>
            </section>
          </div>
        </div>
      </article>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite">メッセージをコピーしました</div>

  <script>
    (() => {
      const STORAGE_KEY = "mile-quote-rates-v3";
      const MODE_KEY = "mile-quote-mode-v1";
      const DEFAULT_RATES = {
        auctionRate: 3.10,
        auctionDiscountRate: 3.05,
        bankRate: 2.80
      };

      let currentMode = "both"; // "both" or "auction-only"

      const elements = {
        auctionRate: document.getElementById("auctionRate"),
        auctionDiscountRate: document.getElementById("auctionDiscountRate"),
        bankRate: document.getElementById("bankRate"),
        mileCount: document.getElementById("mileCount"),
        mileError: document.getElementById("mileError"),
        mileWarning: document.getElementById("mileWarning"),
        mileAdjusted: document.getElementById("mileAdjusted"),
        auctionProfit: document.getElementById("auctionProfit"),
        auctionProfitAmount: document.getElementById("auctionProfitAmount"),
        bankProfit: document.getElementById("bankProfit"),
        bankProfitAmount: document.getElementById("bankProfitAmount"),
        auctionSummary: document.getElementById("auctionSummary"),
        bankSummary: document.getElementById("bankSummary"),
        messageBox: document.getElementById("messageBox"),
        copyButton: document.getElementById("copyButton"),
        toast: document.getElementById("toast")
      };

      let toastTimerId = null;

      function loadRates() {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (!stored) {
            return DEFAULT_RATES;
          }

          const parsed = JSON.parse(stored);
          return {
            auctionRate: Number.isFinite(parsed.auctionRate) ? parsed.auctionRate : DEFAULT_RATES.auctionRate,
            auctionDiscountRate: Number.isFinite(parsed.auctionDiscountRate) ? parsed.auctionDiscountRate : DEFAULT_RATES.auctionDiscountRate,
            bankRate: Number.isFinite(parsed.bankRate) ? parsed.bankRate : DEFAULT_RATES.bankRate
          };
        } catch (error) {
          return DEFAULT_RATES;
        }
      }

      function saveRates(auctionRate, auctionDiscountRate, bankRate) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ auctionRate, auctionDiscountRate, bankRate }));
        } catch (error) {
          return;
        }
      }

      function formatAmount(amount) {
        return `${new Intl.NumberFormat("ja-JP").format(amount)}円`;
      }

      function formatMiles(miles) {
        return `${new Intl.NumberFormat("ja-JP").format(miles)}マイル`;
      }

      function parseRateInput(input, fallback) {
        if (input.validity.badInput || input.value.trim() === "") {
          return fallback;
        }

        const value = Number(input.value);
        return Number.isFinite(value) && value >= 0 ? value : fallback;
      }

      function roundUpToUnit(miles) {
        // 250マイル単位で切り上げ、最小500マイル
        const rounded = Math.ceil(miles / 250) * 250;
        return Math.max(rounded, 500);
      }

      function getMilesState() {
        const raw = elements.mileCount.value.trim();

        if (elements.mileCount.validity.badInput) {
          return { valid: false, hasValue: true, error: "マイル数は数値で入力してください。" };
        }

        if (raw === "") {
          return { valid: false, hasValue: false, error: "" };
        }

        const inputMiles = Number(raw);

        if (!Number.isFinite(inputMiles)) {
          return { valid: false, hasValue: true, error: "マイル数は数値で入力してください。" };
        }

        if (!Number.isInteger(inputMiles)) {
          return { valid: false, hasValue: true, error: "マイル数は整数で入力してください。" };
        }

        if (inputMiles <= 0) {
          return { valid: false, hasValue: true, error: "マイル数は1以上で入力してください。" };
        }

        const miles = roundUpToUnit(inputMiles);
        const adjusted = miles !== inputMiles
          ? `${new Intl.NumberFormat("ja-JP").format(inputMiles)} → ${new Intl.NumberFormat("ja-JP").format(miles)}マイルに調整（250マイル単位）`
          : "";

        return {
          valid: true,
          hasValue: true,
          miles,
          adjusted,
          warning: ""
        };
      }

      function setStatus(element, message) {
        element.textContent = message;
        element.classList.toggle("active", Boolean(message));
      }

      function resetOutput() {
        elements.auctionSummary.textContent = "-";
        elements.bankSummary.textContent = "-";
        elements.messageBox.value = "マイル数を入力すると、ここにご案内文を生成します。";
        elements.copyButton.disabled = true;
      }

      function showToast(message) {
        elements.toast.textContent = message;
        elements.toast.classList.add("show");

        if (toastTimerId) {
          clearTimeout(toastTimerId);
        }

        toastTimerId = window.setTimeout(() => {
          elements.toast.classList.remove("show");
        }, 1800);
      }

      async function copyMessage() {
        const text = elements.messageBox.value;
        if (!text || elements.copyButton.disabled) {
          return;
        }

        try {
          if (!navigator.clipboard?.writeText) {
            throw new Error("Clipboard API unavailable");
          }

          await navigator.clipboard.writeText(text);
          showToast("メッセージをコピーしました");
        } catch (error) {
          elements.messageBox.focus();
          elements.messageBox.select();

          const copied = document.execCommand("copy");
          showToast(copied ? "メッセージをコピーしました" : "コピーできませんでした");
        } finally {
          window.getSelection()?.removeAllRanges();
        }
      }

      function update() {
        const auctionRate = parseRateInput(elements.auctionRate, DEFAULT_RATES.auctionRate);
        const auctionDiscountRate = parseRateInput(elements.auctionDiscountRate, DEFAULT_RATES.auctionDiscountRate);
        const bankRate = parseRateInput(elements.bankRate, DEFAULT_RATES.bankRate);

        saveRates(auctionRate, auctionDiscountRate, bankRate);

        // 利益率計算: ¥10,000 → 8,121pt × 0.5 = 4,060.5マイル
        const COST_PER_MILE = 10000 / (8121 * 0.5);
        const auctionProfitRate = (auctionDiscountRate * 0.9 / COST_PER_MILE - 1) * 100;
        const bankProfitRate = (bankRate / COST_PER_MILE - 1) * 100;

        function formatProfit(rate) {
          const sign = rate >= 0 ? "+" : "";
          return `${sign}${rate.toFixed(1)}%`;
        }

        elements.auctionProfit.textContent = `利益率 ${formatProfit(auctionProfitRate)}`;
        elements.auctionProfit.className = `profit-display ${auctionProfitRate >= 0 ? "profit-positive" : "profit-negative"}`;
        elements.bankProfit.textContent = `利益率 ${formatProfit(bankProfitRate)}`;
        elements.bankProfit.className = `profit-display ${bankProfitRate >= 0 ? "profit-positive" : "profit-negative"}`;

        const milesState = getMilesState();
        setStatus(elements.mileError, milesState.error || "");
        setStatus(elements.mileWarning, milesState.warning || "");
        setStatus(elements.mileAdjusted, milesState.adjusted || "");

        if (!milesState.valid) {
          elements.auctionProfitAmount.textContent = "";
          elements.bankProfitAmount.textContent = "";
          resetOutput();
          return;
        }

        // 利益額 = 売上 - 原価（売上 × 利益率 / (1+利益率) でも同じ）
        const { miles } = milesState;
        const auctionSales = Math.round(miles * auctionDiscountRate) * 0.9;
        const bankSales = Math.round(miles * bankRate);
        const cost = miles * COST_PER_MILE;
        const auctionProfitAmount = Math.round(auctionSales - cost);
        const bankProfitAmountVal = Math.round(bankSales - cost);

        function formatProfitAmount(amount) {
          const sign = amount >= 0 ? "+" : "";
          return `利益 ${sign}${new Intl.NumberFormat("ja-JP").format(amount)}円`;
        }

        elements.auctionProfitAmount.textContent = formatProfitAmount(auctionProfitAmount);
        elements.auctionProfitAmount.className = `profit-display ${auctionProfitAmount >= 0 ? "profit-positive" : "profit-negative"}`;
        elements.bankProfitAmount.textContent = formatProfitAmount(bankProfitAmountVal);
        elements.bankProfitAmount.className = `profit-display ${bankProfitAmountVal >= 0 ? "profit-positive" : "profit-negative"}`;

        const auctionAmount = Math.round(miles * auctionRate);
        const auctionDiscountAmount = Math.round(miles * auctionDiscountRate);
        const bankAmount = Math.round(miles * bankRate);

        elements.auctionSummary.textContent = `${formatAmount(auctionAmount)} → 値引き ${formatAmount(auctionDiscountAmount)}`;
        elements.bankSummary.textContent = formatAmount(bankAmount);

        // 250で割り切れる場合は調整文言を省略
        const wasAdjusted = milesState.adjusted !== "";
        const adjustLine = wasAdjusted
          ? `250マイルごとのご提供となりますため、${formatMiles(miles)}でお見積りいたします。`
          : `${formatMiles(miles)}でお見積りいたします。`;

        // 有効期限: 翌日いっぱい
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 2);
        const dayNames = ["日", "月", "火", "水", "木", "金", "土"];
        const expiryDate = `${tomorrow.getMonth() + 1}月${tomorrow.getDate()}日（${dayNames[tomorrow.getDay()]}）`;

        const messageLines = [
          "この度はお問い合わせいただきありがとうございました。",
          "",
          adjustLine,
          "",
          `ヤフオクですと、${auctionRate.toFixed(2)}円/マイル（${formatAmount(auctionAmount)}）のところお値引きさせて頂き、${formatAmount(auctionDiscountAmount)}（${auctionDiscountRate.toFixed(2)}円/マイル）でいかがでしょうか。よろしければ出品いたしますのでご都合をお知らせください。`
        ];

        if (currentMode === "both") {
          messageLines.push(
            "",
            "最もお安く済ませたい場合、直接当方への銀行振込みを承ります。",
            `こちらでよろしければ${formatAmount(bankAmount)}（${bankRate.toFixed(2)}円/マイル）でご提供が可能です。よろしければ振込口座をご案内いたしますのでご都合をお知らせください。`
          );
        }

        messageLines.push(
          "",
          `なお、在庫確保の関係上、本見積りの有効期限は${expiryDate}いっぱいとさせていただきます。`,
          "",
          "以上、ご検討の程よろしくお願いします。"
        );

        elements.messageBox.value = messageLines.join("\n");

        elements.copyButton.disabled = false;
      }

      function applyMode(mode) {
        currentMode = mode;
        document.body.classList.toggle("mode-auction-only", mode === "auction-only");
        document.querySelectorAll(".mode-tab").forEach((tab) => {
          tab.classList.toggle("active", tab.dataset.mode === mode);
        });
        try {
          localStorage.setItem(MODE_KEY, mode);
        } catch (error) {
          // ignore
        }
        update();
      }

      function initialize() {
        const savedRates = loadRates();
        elements.auctionRate.value = savedRates.auctionRate.toFixed(2);
        elements.auctionDiscountRate.value = savedRates.auctionDiscountRate.toFixed(2);
        elements.bankRate.value = savedRates.bankRate.toFixed(2);

        [elements.auctionRate, elements.auctionDiscountRate, elements.bankRate, elements.mileCount].forEach((input) => {
          input.addEventListener("input", update);
          input.addEventListener("change", update);
        });

        elements.copyButton.addEventListener("click", copyMessage);

        // モード切替タブ
        document.querySelectorAll(".mode-tab").forEach((tab) => {
          tab.addEventListener("click", () => applyMode(tab.dataset.mode));
        });

        const savedMode = (() => {
          try { return localStorage.getItem(MODE_KEY); } catch { return null; }
        })();
        applyMode(savedMode === "auction-only" ? "auction-only" : "both");
      }

      initialize();
    })();
  </script>
</body>
</html>
